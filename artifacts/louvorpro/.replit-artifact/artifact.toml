kind = "web"
previewPath = "/"
title = "LouvorPro"
version = "1.0.0"
id = "artifacts/louvorpro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20192
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/louvorpro run dev"

[services.env]
PORT = "20192"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/louvorpro", "run", "build"]
publicDir = "artifacts/louvorpro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
